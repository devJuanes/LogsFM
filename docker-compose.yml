version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: radio-postgres
    environment:
      POSTGRES_DB: radio_db
      POSTGRES_USER: radio
      POSTGRES_PASSWORD: RadioPass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radio -d radio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Icecast Streaming Server
  icecast:
    image: infinito/icecast:latest
    container_name: radio-icecast
    ports:
      - "8000:8000"
    volumes:
      - ./media:/var/lib/icecast2/media
      - ./playlist.txt:/var/lib/icecast2/playlist.txt
      - ./ezstream.xml:/etc/icecast2/ezstream.xml
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=hackme
      - ICECAST_PASSWORD=hackme
      - ICECAST_RELAY_PASSWORD=hackme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status.xsl"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: radio-backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - media_data:/var/lib/icecast2/media
    environment:
      - DATABASE_URL=postgresql://radio:RadioPass123@postgres:5432/radio_db
      - ICECAST_URL=http://icecast:8000
      - ICECAST_ADMIN_PASSWORD=hackme
      - ICECAST_SOURCE_PASSWORD=hackme
      - SECRET_KEY=change-this-in-production
      - MEDIA_DIR=/var/lib/icecast2/media/
      - PLAYLIST_FILE=/var/lib/icecast2/playlist.txt
    depends_on:
      postgres:
        condition: service_healthy
      icecast:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "
        pip install -r requirements.txt &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend Next.js (logsfm.com)
  frontend:
    image: node:20-alpine
    container_name: radio-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
    command: >
      sh -c "
        npm install &&
        npm run dev
      "

  # Radio Subdomain Next.js (radio.logsfm.com)
  radio-subdomain:
    image: node:20-alpine
    container_name: radio-subdomain
    working_dir: /app
    volumes:
      - ./radio-subdomain:/app
      - radio_node_modules:/app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_STREAM_URL=http://localhost:8000/stream
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
      - icecast
    restart: unless-stopped
    command: >
      sh -c "
        npm install &&
        npm run dev
      "

  # Nginx (optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: radio-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/logsfm.com:/etc/nginx/conf.d/logsfm.com.conf:ro
  #     - ./nginx/radio.logsfm.com:/etc/nginx/conf.d/radio.logsfm.com.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - frontend
  #     - radio-subdomain
  #     - backend
  #     - icecast
  #   restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  frontend_node_modules:
  radio_node_modules:
